services:
  # Backend API
  - type: web
    name: medical-research-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: MODEL_NAME
        value: models/gemini-2.5-flash
      - key: PUBMED_EMAIL
        sync: false
      - key: TAVILY_API_KEY
        value: ""
      - key: CORS_ORIGINS
        value: '["https://YOUR_FRONTEND_URL.onrender.com"]'
      - key: LANGCHAIN_TRACING_V2
        value: "false"